<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{% block title %}{{ menu.event.name if menu and menu.event else 'Bonsystem' }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__pulse" aria-hidden="true"></span>
        <div class="topbar__titles">
          <h1 class="topbar__event">
            {{ menu.event.name if menu and menu.event else 'Bonsystem' }}
          </h1>
          {% if menu and menu.event and menu.event.organizer %}
            <span class="topbar__sub">{{ menu.event.organizer }}</span>
          {% endif %}
        </div>
      </div>
      <span id="printer-status" class="status status--unknown" title="Druckerstatus">Drucker: …</span>
    </header>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  </body>
</html>
